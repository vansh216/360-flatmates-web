<!DOCTYPE html>
<html lang="en" data-scroll-behavior="smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#F4F3EE" />
    <meta name="description" content="Find compatible flatmates and verified rooms across India. 6-dimension matching, visits, chat, and warm editorial search for better living." />
    <meta property="og:title" content="360 Flatmates" />
    <meta property="og:description" content="Verified homes. Compatible flatmates. Better living, together." />
    <meta property="og:site_name" content="360 Flatmates" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />
    <link rel="icon" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="/fonts/fonts.css" />
    <script>
      (() => {
        try {
          const raw = localStorage.getItem("360-flatmates-ui");
          let theme = "light";
          let palette = "terracotta";
          if (raw) {
            try {
              const parsed = JSON.parse(raw);
              if (parsed.state) {
                if (parsed.state.theme) theme = parsed.state.theme;
                if (parsed.state.palette) palette = parsed.state.palette;
              }
            } catch {}
          }
          const systemDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          if (theme === "dark" || (theme === "system" && systemDark)) {
            document.documentElement.dataset.theme = "dark";
          }
          document.documentElement.dataset.palette = palette;
        } catch {}
      })();
    </script>
  </head>
  <body>
    <a href="#main" class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 focus:z-50 focus:bg-surface focus:px-4 focus:py-2 focus:rounded-[10px] focus:shadow-md focus:text-ink" style="position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;">
      Skip to main content
    </a>
    <div id="root"></div>
    <script type="module" src="/src/entry.tsx"></script>
  </body>
</html>
