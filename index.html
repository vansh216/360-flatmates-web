<!DOCTYPE html>
<html lang="en" data-scroll-behavior="smooth">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#F4F3EE" />
  <!--
    Default SEO / social meta. These are the SPA-shell fallback: SeoHelmet
    overrides them per-route at runtime (and the prerender step bakes the
    overrides into each dist/<route>/index.html). They exist so that routes
    which are NOT prerendered (and crawlers/unfurlers that read the raw shell)
    still get a sensible title/description/OG/Twitter card instead of nothing.
    Keep og:image on the PNG (SVG OG images are not supported by most platforms).
  -->
  <meta name="description"
    content="Find compatible flatmates and verified rooms across India. 6-dimension matching, visits, chat, and warm editorial search for better living." />
  <meta property="og:title" content="360 Flatmates" />
  <meta property="og:description" content="Verified homes. Compatible flatmates. Better living, together." />
  <meta property="og:site_name" content="360 Flatmates" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/og-image.png" />
  <meta property="og:locale" content="en_IN" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@360ghar" />
  <meta name="twitter:creator" content="@360ghar" />
  <link rel="icon" href="/favicon.ico" sizes="32x32" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/favicon-192.png" />
  <link rel="mask-icon" href="/favicon.svg" color="#C96442" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" href="/fonts/Fraunces-Variable.ttf" as="font" type="font/ttf" crossorigin />
  <link rel="preload" href="/fonts/Inter-Variable.ttf" as="font" type="font/ttf" crossorigin />
  <link rel="preload" href="/fonts/JetBrainsMono-Variable.ttf" as="font" type="font/ttf" crossorigin />
  <link rel="preload" href="/fonts/InstrumentSerif-Italic.ttf" as="font" type="font/ttf" crossorigin />
  <link rel="stylesheet" href="/fonts/fonts.css" />

  <script>
    (() => {
      try {
        const raw = localStorage.getItem("360_flatmates-ui");
        let theme = "light";
        let palette = "terracotta";
        if (raw) {
          try {
            const parsed = JSON.parse(raw);
            if (parsed.state) {
              if (parsed.state.theme) theme = parsed.state.theme;
              if (parsed.state.palette) palette = parsed.state.palette;
            }
          } catch { }
        }
        const systemDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        if (theme === "dark" || (theme === "system" && systemDark)) {
          document.documentElement.dataset.theme = "dark";
        }
        document.documentElement.dataset.palette = palette;
      } catch { }
    })();
  </script>
</head>

<body>
  <a href="#main"
    class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 focus:z-50 focus:bg-surface focus:px-4 focus:py-2 focus:rounded-[10px] focus:shadow-md focus:text-ink"
    style="position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;">
    Skip to main content
  </a>
  <div id="root">
    <noscript>
      <div style="font-family:Inter,system-ui,sans-serif;max-width:720px;margin:0 auto;padding:24px;color:#1F1A14">
        <h1>360 Flatmates — Find compatible flatmates &amp; verified rooms across India</h1>
        <p>
          360 Flatmates is an India-first flatmate and room-rental platform that matches people on a
          6-dimension compatibility score, society vibe tags, budget, and lifestyle — then handles
          visit scheduling, in-app chat, and verified listings. Find your flatmate, find your vibe.
        </p>
        <ul>
          <li><a href="/discover">Browse verified rooms &amp; flats</a></li>
          <li><a href="/cities/bangalore">Flatmates &amp; rooms in Bangalore</a></li>
          <li><a href="/cities/gurugram">Flatmates &amp; rooms in Gurugram</a></li>
          <li><a href="/blog">Guides: flatmate agreements, moving in, inspections &amp; more</a></li>
          <li><a href="/search/semantic">Semantic search for rooms by vibe &amp; lifestyle</a></li>
          <li><a href="/about">About 360 Flatmates</a></li>
        </ul>
        <p>Enable JavaScript for the full interactive experience.</p>
      </div>
    </noscript>
  </div>
  <script type="module" src="/src/entry.tsx"></script>
  <script defer data-domain="360ghar.com" src="https://plausible.io/js/script.js"></script>

</body>

</html>
