project: 360 Flatmates Web
imagemagick: true
ci: false

environments:
  local_dev:
    url: http://localhost:3000
    restrictions: []

default_target: local_dev

auth:
  method: phone-otp
  provider: supabase
  secondary_methods:
    - phone-password
    - google-oauth

personas:
  - name: room_poster
    description: "Has a room/property to list. Finds compatible flatmates to fill it."
    credentials_source: env-var
    secret_name: TEST_PHONE
    test_focus:
      - post listing
      - manage listings
      - dashboard analytics
      - view incoming likes
    cannot_do:
      - access admin moderation pages
  - name: co_hunter
    description: "Looking for a room or flatmate. Browses listings and swipes on profiles."
    credentials_source: env-var
    secret_name: TEST_PHONE
    test_focus:
      - browse home feed
      - swipe deck
      - explore map view
      - chat with matches
    cannot_do:
      - access admin moderation pages
      - post new listings
  - name: open_to_both
    description: "Flexible, open to listing a room or finding one. Gets full experience."
    credentials_source: env-var
    secret_name: TEST_PHONE
    test_focus:
      - full navigation (all tabs)
      - both post and browse
      - onboarding mode switch
    cannot_do:
      - access admin moderation pages
  - name: admin
    description: "Moderation access. Can review, approve, and reject listings and reports."
    credentials_source: env-var
    secret_name: TEST_PHONE
    test_focus:
      - admin moderation listings
      - admin moderation reports
      - admin prescreen
    cannot_do:
      - post listings as regular user
  - name: new_user
    description: "Fresh signup, no existing data. Tests onboarding and empty states."
    email_pattern: "qa+signup_{RUN_ID}@360ghar.com"
    credentials_source: created_during_run
    test_focus:
      - onboarding
      - empty states
      - first-run experience
      - choose role flow
    cannot_do:
      - skip onboarding

apps:
  web:
    path_patterns:
      - "src/app/**"
      - "src/components/**"
      - "src/hooks/**"
      - "src/lib/**"
      - "src/styles/**"
      - "public/**"
    skill: qa-web
    test_tool: agent-browser
    build_command: "npm run dev"

feature_flags:
  provider: none
  dashboard_url: ""
  how_to_override: ""

integrations:
  google_maps:
    provider: google
    api_key_env: NEXT_PUBLIC_GOOGLE_MAPS_API_KEY
  firebase_fcm:
    provider: firebase
    vapid_key_env: NEXT_PUBLIC_FCM_VAPID_KEY
  supabase:
    provider: supabase
    url_env: NEXT_PUBLIC_SUPABASE_URL
    key_env: NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY

cleanup:
  auto_cleanup: false
  strategy: none
  instructions: "Dev environment can accumulate test data. No cleanup required."

failure_learning: suggest_in_report
