categories_completed:
  - default_qa_target
  - personas_and_roles
  - critical_flows
  - external_services
  - cleanup
  - imagemagick
  - github_action
  - failure_learning

default_qa_target:
  environment: local_dev
  restrictions: none

personas_and_roles:
  - name: room_poster
    description: Has a room/property to list, finds flatmates
    test_account: create_via_signup
  - name: co_hunter
    description: Looking for a room/flatmate
    test_account: create_via_signup
  - name: open_to_both
    description: Flexible, full experience
    test_account: create_via_signup
  - name: admin
    description: Moderation access
    test_account: create_via_signup
  - name: new_user
    description: Fresh signup, no existing data
    email_pattern: 'qa+signup_{RUN_ID}@360ghar.com'
    test_focus: [onboarding, empty states, first-run]
  credentials_source: env_var
  secret_names: [TEST_PHONE, TEST_PASSWORD]

critical_flows:
  confirmed: true
  flows:
    - auth_login_otp
    - auth_login_password
    - auth_signup
    - auth_google_oauth
    - auth_forgot_password
    - onboarding_multi_step
    - onboarding_choose_role
    - home_feed_browse
    - home_filter_chips
    - explore_map_view
    - swipe_deck
    - likes_and_matches
    - chat_conversations
    - post_listing
    - manage_listing
    - profile_view_edit
    - settings
    - admin_moderation
    - visits_scheduling
    - notifications
    - public_pages
  success_criteria: default_page_loads_key_elements_visible
  data_cleanup: none_needed

external_services:
  google_maps: use_env_key
  firebase_fcm: use_env_key

cleanup:
  auto_cleanup: false
  strategy: none
  instructions: 'Dev environment can accumulate test data'

imagemagick: true

github_action:
  generate: true
  required: false
  optional_note: 'QA check is informational only, does not block merge'
  preview_deployment: false

failure_learning: suggest_in_report
